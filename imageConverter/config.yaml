name: "Hello world"
description: "My first real add-on!"
version: "1.3.8"
slug: "hello_world"
options:
  inputpath: "/media"
  outputpath: "media"
schema:
  inputpath: str
  outputpath: str
init: false

host_network: true
homeassistant_api: true
map:
  - media:rw

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: services
ports:
  8000/tcp: 8000